name: Waka Readme

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    steps:
      - uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.THEBARBYTES_SECRET }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_TOTAL: true
          SHOW_PROFILE: true
          SHOW_OS: true
          SHOW_EDITORS: true
          SHOW_LANGUAGE: true
          SHOW_PROJECTS: true
          SHOW_TIMEZONE: true
          SHOW_COMMIT: true
          SHOW_DAYS_OF_WEEK: true
          BLOCKS: ░▒▓█
          TIME_RANGE: all_time
          COMMIT_BY_ME: true
